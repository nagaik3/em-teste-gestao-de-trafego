services:
  - type: web
    name: atribuidor-impera
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: CLICKUP_API_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
